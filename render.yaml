services:
  - type: web
    name: delivery-tracker-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # set to your Netlify URL after deploy
      - key: PORT
        value: "10000"       # Render assigns this automatically
